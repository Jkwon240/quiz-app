<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영어 암기 카드</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR','Malgun Gothic',sans-serif;background:#f5f6f8;color:#2d3748;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.top{background:linear-gradient(135deg,#ffffff,#f0f2f5);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e2e8f0;flex-shrink:0;gap:10px;flex-wrap:wrap}
.top-title{font-size:15px;font-weight:700;color:#2563eb}
.top-sub{font-size:10px;color:#64748b;margin-top:2px}
.top-btns{display:flex;gap:6px}
.top-btn{padding:6px 14px;border-radius:6px;border:1px solid #e2e8f0;background:#f8fafc;color:#475569;cursor:pointer;font-size:12px;transition:.15s}
.top-btn.on{background:#eff6ff;border-color:#2563eb;color:#2563eb;font-weight:700}
.sync-bar{padding:4px 20px;font-size:11px;display:flex;align-items:center;gap:6px;flex-shrink:0;background:#f0fdf4;border-bottom:1px solid #bbf7d0;color:#16a34a}
.sync-bar.loading{background:#f8fafc;border-color:#e2e8f0;color:#64748b}
.sync-bar.error{background:#fef2f2;color:#dc2626}
.sync-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.body-wrap{display:flex;flex:1;overflow:hidden}
.side{background:#ffffff;border-right:1px solid #e2e8f0;padding:12px;overflow-y:auto;width:210px;flex-shrink:0}
.side-h{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#94a3b8;margin-bottom:6px;margin-top:8px}
.side-h:first-child{margin-top:0}
.cat-btn{width:100%;text-align:left;padding:8px 10px;margin-bottom:3px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;color:#475569;cursor:pointer;font-size:12px;transition:.15s}
.cat-btn:hover,.cat-btn.on{background:#eff6ff;border-color:#2563eb;color:#2563eb}
.cat-btn .cnt{float:right;font-size:10px;opacity:.5}
.side-btn{width:100%;padding:7px 10px;margin-bottom:3px;border-radius:6px;border:1px solid #e2e8f0;background:#f8fafc;color:#475569;cursor:pointer;font-size:11px;text-align:left;transition:.15s}
.side-btn:hover{border-color:#2563eb;color:#2563eb}
.divider{border-top:1px solid #e2e8f0;margin:8px 0}
.mini-stat{display:flex;gap:5px;margin-bottom:6px}
.ms{flex:1;text-align:center;background:#f8fafc;border:1px solid #e2e8f0;border-radius:5px;padding:4px 2px}
.ms .n{font-size:13px;font-weight:700;color:#2563eb}
.ms .l{font-size:9px;color:#64748b}
.prog-label{font-size:10px;color:#94a3b8;margin-bottom:4px;display:flex;justify-content:space-between}
.prog-track{background:#e2e8f0;border-radius:3px;height:4px;overflow:hidden}
.prog-fill{background:linear-gradient(90deg,#3b82f6,#2563eb);height:100%;transition:.4s;border-radius:3px;width:0%}
.main{flex:1;overflow-y:auto;padding:24px;display:flex;justify-content:center}
.main-inner{width:100%;max-width:640px}
/* 카드 */
.study-prog{display:flex;justify-content:space-between;font-size:12px;color:#64748b;margin-bottom:14px}
.streak{color:#d97706;font-weight:700}
.card-scene{width:100%;height:220px;perspective:1200px;cursor:pointer;margin-bottom:16px}
.card-3d{width:100%;height:100%;transition:transform .45s;transform-style:preserve-3d;position:relative}
.card-3d.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:14px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:24px}
.front{background:linear-gradient(135deg,#eff6ff,#dbeafe);border:1px solid #bfdbfe}
.back{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:1px solid #bbf7d0;transform:rotateY(180deg)}
.c-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:#64748b;margin-bottom:12px}
.c-main{font-size:18px;font-weight:600;color:#1e293b;line-height:1.55}
.c-sub{font-size:12px;color:#475569;margin-top:8px;line-height:1.5}
.c-hint{font-size:11px;color:#94a3b8;margin-top:14px}
.btn-row{display:flex;gap:10px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
.abtn{padding:11px 26px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:700;transition:.15s}
.abtn.bad{background:#fff5f5;color:#dc2626;border:1px solid #fecaca}
.abtn.bad:hover{background:#dc2626;color:#fff}
.abtn.good{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
.abtn.good:hover{background:#16a34a;color:#fff}
.abtn.skip{background:#f8fafc;color:#475569;border:1px solid #e2e8f0}
.abtn.skip:hover{background:#2563eb;color:#fff}
.nav-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.nbtn{padding:7px 16px;border-radius:6px;border:1px solid #e2e8f0;background:#f8fafc;color:#475569;cursor:pointer;font-size:12px;transition:.15s}
.nbtn:hover{border-color:#2563eb;color:#2563eb}
.nbtn.bm-on{border-color:#ca8a04;color:#ca8a04}
.done-box{text-align:center;padding:50px 20px}
.done-box .ico{font-size:52px;margin-bottom:14px}
.done-box h2{font-size:20px;color:#2563eb;margin-bottom:8px}
.done-box p{color:#64748b;font-size:13px;line-height:1.7;margin-bottom:20px}
/* 목록 모드 */
.list-top{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.sbox{flex:1;padding:8px 12px;border-radius:6px;border:1px solid #e2e8f0;background:#ffffff;color:#2d3748;font-size:13px;outline:none}
.sbox:focus{border-color:#2563eb}
.lcnt{font-size:11px;color:#64748b;white-space:nowrap}
.lcard{background:#ffffff;border:1px solid #e2e8f0;border-radius:8px;padding:12px 14px;display:flex;gap:10px;margin-bottom:7px;align-items:flex-start;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.lcard.ok{border-color:#bbf7d0;background:#f0fdf4}
.lcard.fail{border-color:#fecaca;background:#fff5f5}
.lnum{font-size:10px;color:#94a3b8;min-width:24px;padding-top:2px}
.len{font-size:13px;color:#1e293b;font-weight:500;line-height:1.5}
.lko{font-size:12px;color:#64748b;margin-top:3px;line-height:1.4}
.lbadges{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap}
.bdg{padding:1px 6px;border-radius:3px;font-size:10px;font-weight:700}
.bdg.ok{background:#f0fdf4;color:#16a34a}
.bdg.fail{background:#fff5f5;color:#dc2626}
.bdg.bm{background:#fefce8;color:#ca8a04}
.bdg.new{background:#f1f5f9;color:#64748b}
.lbtn{padding:3px 8px;border-radius:4px;border:1px solid #e2e8f0;background:transparent;color:#94a3b8;cursor:pointer;font-size:10px;flex-shrink:0;transition:.15s}
.lbtn:hover{border-color:#2563eb;color:#2563eb}
.lbtn.on{border-color:#ca8a04;color:#ca8a04}
@media(max-width:600px){.side{display:none}.main{padding:14px}}

.code-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:1000;display:flex;align-items:center;justify-content:center}
.code-box{background:#ffffff;border-radius:14px;padding:30px 28px;width:320px;box-shadow:0 8px 32px rgba(0,0,0,.15);text-align:center}
.code-box h2{font-size:18px;font-weight:700;color:#1e293b;margin-bottom:8px}
.code-box p{font-size:12px;color:#64748b;line-height:1.6;margin-bottom:20px}
.code-input{width:100%;padding:12px 16px;border-radius:8px;border:2px solid #e2e8f0;font-size:18px;font-weight:700;text-align:center;letter-spacing:4px;outline:none;color:#1e293b;font-family:inherit;text-transform:uppercase}
.code-input:focus{border-color:#2563eb}
.code-confirm-btn{width:100%;margin-top:12px;padding:12px;border-radius:8px;border:none;background:#2563eb;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s}
.code-confirm-btn:hover{background:#1d4ed8}
.code-hint{font-size:10px;color:#94a3b8;margin-top:10px}
.code-badge{background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;padding:6px 10px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.code-badge .cb-label{font-size:10px;color:#64748b}
.code-badge .cb-code{font-size:13px;font-weight:700;color:#2563eb;letter-spacing:2px}
.code-badge .cb-change{font-size:10px;color:#94a3b8;cursor:pointer;text-decoration:underline}
.code-badge .cb-change:hover{color:#2563eb}
</style>
</head>
<body>

<div class="code-overlay" id="codeOverlay" style="display:none">
  <div class="code-box">
    <div style="font-size:32px;margin-bottom:10px">🔑</div>
    <h2>학습 코드 설정</h2>
    <p>모든 기기에서 학습 기록을 공유하려면<br>나만의 코드를 설정하세요.<br>영문+숫자 조합 추천 (예: JAY001)</p>
    <input class="code-input" id="codeInput" maxlength="10" placeholder="코드 입력" oninput="this.value=this.value.toUpperCase()" onkeydown="if(event.key==='Enter')confirmCode()">
    <button class="code-confirm-btn" onclick="confirmCode()">✓ 이 코드로 시작하기</button>
    <div class="code-hint">※ 같은 코드를 입력하면 어느 기기에서든 기록이 연동됩니다</div>
  </div>
</div>

<div class="top">
  <div>
    <div class="top-title">📚 영어 암기 카드</div>
    <div class="top-sub">400문장 · 이메일 · 물류 · 비즈니스 · 일상 · 스페이스드 리피티션</div>
  </div>
  <div class="top-btns">
    <button class="top-btn on" id="btnStudy" onclick="setMode('study')">📖 학습</button>
    <button class="top-btn" id="btnList" onclick="setMode('list')">📋 목록</button>
  </div>
</div>
<div class="sync-bar loading" id="syncBar">
  <div class="sync-dot"></div><span id="syncMsg">DB 연결 중...</span>
</div>
<div class="body-wrap">
  <div class="side">
    <div class="side-h">카테고리</div>
    <button class="cat-btn on" onclick="setCat('all',this)">🌐 전체 <span class="cnt">400</span></button>
    <button class="cat-btn" onclick="setCat('email',this)">📧 비즈니스 이메일 <span class="cnt">100</span></button>
    <button class="cat-btn" onclick="setCat('logistics',this)">🚢 해운물류 회화 <span class="cnt">100</span></button>
    <button class="cat-btn" onclick="setCat('biz',this)">💼 비즈니스 회화 <span class="cnt">100</span></button>
    <button class="cat-btn" onclick="setCat('daily',this)">☀️ 일상 회화 <span class="cnt">100</span></button>
    <div class="divider"></div>
    <div class="side-h">세션 시작</div>
    <button class="side-btn" onclick="startSession('all')">▶ 전체 학습</button>
    <button class="side-btn" onclick="startSession('unseen')">🆕 안 본 것만</button>
    <button class="side-btn" onclick="startSession('fail')">🔥 틀린 것만</button>
    <button class="side-btn" onclick="startSession('bookmark')">⭐ 북마크만</button>
    <button class="side-btn" onclick="startSession('random')">🔀 랜덤 50장</button>
    <div class="divider"></div>
    <div class="side-h">진도</div>
    <div class="mini-stat">
      <div class="ms"><div class="n" id="mDone">0</div><div class="l">학습</div></div>
      <div class="ms"><div class="n" id="mMastered" style="color:#16a34a">0</div><div class="l">완벽</div></div>
      <div class="ms"><div class="n" id="mFail" style="color:#dc2626">0</div><div class="l">복습</div></div>
    </div>
    <div class="prog-label"><span>암기율</span><span id="progPct">0%</span></div>
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    <div class="divider"></div>
    <div class="side-h">내 학습 코드</div>
    <div class="code-badge">
      <div><div class="cb-label">현재 코드</div><div class="cb-code" id="sideCode">-</div></div>
      <span class="cb-change" onclick="changeCode()">변경</span>
    </div>
    <div class="divider"></div>
    <button class="side-btn" style="color:#dc2626" onclick="resetAll()">🗑 전체 초기화</button>
  </div>
  <div class="main">
    <div class="main-inner" id="mainInner">
      <div style="text-align:center;padding:60px 20px;color:#94a3b8">
        <div style="font-size:36px;margin-bottom:12px">📚</div>
        <div>왼쪽에서 세션을 선택하세요</div>
      </div>
    </div>
  </div>
</div>

<script>
// ===== SUPABASE =====
const SB_URL='https://pdoelwybbnrdyitoeqrb.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkb2Vsd3liYm5yZHlpdG9lcXJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwODY1ODgsImV4cCI6MjA5NDY2MjU4OH0.KTAu-umLBVF4ePOn1V1hjdOhmnHlcDlgFrgZh2o1SKI';
function getUserCode(){return localStorage.getItem('quiz_user_code')||'';}
function setUserCode(code){localStorage.setItem('quiz_user_code',code);}

function showCodePopup(){
  document.getElementById('codeOverlay').style.display='flex';
  setTimeout(()=>document.getElementById('codeInput').focus(),100);
}
function confirmCode(){
  const code=document.getElementById('codeInput').value.trim().toUpperCase();
  if(code.length<2){alert('코드를 2자 이상 입력해주세요!');return;}
  setUserCode(code);
  document.getElementById('codeOverlay').style.display='none';
  document.getElementById('sideCode').textContent=code;
  state={};
  init();
}
function changeCode(){
  document.getElementById('codeInput').value=getUserCode();
  document.getElementById('codeOverlay').style.display='flex';
  setTimeout(()=>document.getElementById('codeInput').focus(),100);
}
const DEV=getUserCode()||'fc_guest_'+Date.now();

async function sbReq(method,path,body=null){
  try{
    const opts={method,headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':method==='POST'?'resolution=merge-duplicates':''}};
    if(body)opts.body=JSON.stringify(body);
    const r=await fetch(SB_URL+'/rest/v1/'+path,opts);
    const t=await r.text();return t?JSON.parse(t):[];
  }catch(e){return[];}
}

function setSyncStatus(type,msg){
  const b=document.getElementById('syncBar');
  b.className='sync-bar'+(type==='error'?' error':type==='loading'?' loading':'');
  document.getElementById('syncMsg').textContent=msg;
}

async function loadProgress(){
  setSyncStatus('loading','기록 불러오는 중...');
  try{
    const rows=await sbReq('GET',`quiz_progress?device_id=eq.${encodeURIComponent(getUserCode()||DEV)}&question_index=gte.20000&select=question_index,result`);
    rows.forEach(r=>{
      const id=r.question_index-20000;
      try{state[id]=JSON.parse(r.result);}catch(e){}
    });
    setSyncStatus('ok','✓ 연결됨 · '+DEV.slice(0,12)+'...');
  }catch(e){setSyncStatus('error','DB 연결 실패');}
  updateSidebar();
}

async function saveCard(id){
  const _sc=getUserCode();localStorage.setItem('fc_state_'+(_sc||'default'),JSON.stringify(state));
  try{
    await sbReq('POST','quiz_progress',{device_id:getUserCode()||DEV,question_index:id+20000,result:JSON.stringify(state[id])});
    setSyncStatus('ok','✓ 저장됨 · '+new Date().toLocaleTimeString('ko-KR'));
  }catch(e){setSyncStatus('error','저장 실패');}
}

async function resetAll(){
  if(!confirm('모든 암기 기록을 초기화합니까?'))return;
  state={};
  localStorage.removeItem('fc_state2');
  try{await sbReq('DELETE',`quiz_progress?device_id=eq.${encodeURIComponent(getUserCode()||DEV)}&question_index=gte.20000`);}catch(e){}
  updateSidebar();
  setSyncStatus('ok','초기화 완료');
  renderWelcome();
}

{id:143,cat:'logistics',en:"The cargo is FCL, so it will go directly to the CY at destination.",ko:"화물은 FCL이라 목적지 CY로 직접 반입됩니다."},
{id:144,cat:'logistics',en:"We need to check the AMS filing status for the US-bound cargo.",ko:"미국행 화물의 AMS 신고 현황을 확인해야 합니다."},

{id:147,cat:'logistics',en:"The container dwell time at the terminal is currently three days.",ko:"현재 터미널 내 컨테이너 체류 기간은 3일입니다."},
{id:148,cat:'logistics',en:"Please confirm the booking reference number for this shipment.",ko:"이 화물의 부킹 참조 번호를 확인해 주세요."},

{id:150,cat:'logistics',en:"The feeder vessel will connect to the mother ship at Busan Hub.",ko:"피더 선박이 부산 허브에서 모선과 연결됩니다."},
{id:151,cat:'logistics',en:"Can you check the gate-out time for this container at the terminal?",ko:"이 컨테이너의 터미널 게이트 반출 시간을 확인해 주실 수 있나요?"},
{id:152,cat:'logistics',en:"We need the weight certificate before we can finalize the VGM.",ko:"VGM을 확정하기 전에 중량 증명서가 필요합니다."},
{id:153,cat:'logistics',en:"The port authority has imposed a General Rate Increase next month.",ko:"항만 당국이 다음 달 GRI를 시행합니다."},
{id:154,cat:'logistics',en:"We are looking for a slot charter on the Asia-North America lane.",ko:"아시아-북미 항로에서 선복 대선을 찾고 있습니다."},
{id:155,cat:'logistics',en:"Please confirm whether this is a port-to-port or door-to-door service.",ko:"이것이 항구 간 서비스인지 문전 배송 서비스인지 확인해 주세요."},
{id:156,cat:'logistics',en:"The shipping line has issued a blank sailing notice for next week.",ko:"선사가 다음 주 공백 운항(Blank Sailing) 공지를 발표했습니다."},
{id:157,cat:'logistics',en:"We need to rebook the cargo to the next available vessel.",ko:"다음 가용 선박으로 화물을 재부킹해야 합니다."},
{id:158,cat:'logistics',en:"Can you provide the bill of lading instruction template?",ko:"B/L 지시서 양식을 제공해 주실 수 있나요?"},
{id:159,cat:'logistics',en:"The stuffing will take place at our warehouse on Thursday.",ko:"화물 적입은 목요일 저희 창고에서 진행됩니다."},
{id:160,cat:'logistics',en:"We would like to arrange a back-to-back booking for the return leg.",ko:"귀항 구간을 위한 백투백 부킹을 준비하고 싶습니다."},
{id:161,cat:'logistics',en:"The forwarder has confirmed the booking and sent the booking confirmation.",ko:"포워더가 부킹을 확인하고 부킹 확인서를 보내왔습니다."},
{id:162,cat:'logistics',en:"We need to file the import declaration within 24 hours of arrival.",ko:"입항 후 24시간 이내에 수입 신고를 해야 합니다."},
{id:163,cat:'logistics',en:"The cargo is subject to phytosanitary inspection at the port of entry.",ko:"화물은 입항항에서 식물검역 검사 대상입니다."},
{id:164,cat:'logistics',en:"Can you arrange a truck to pick up the container from the port?",ko:"항만에서 컨테이너를 픽업할 트럭을 준비해 주실 수 있나요?"},
{id:165,cat:'logistics',en:"The shipper has provided the wrong HS code — please amend.",ko:"화주가 잘못된 HS 코드를 제공하였으니 수정 부탁드립니다."},
{id:166,cat:'logistics',en:"We need to check if the cargo is on the restricted commodity list.",ko:"화물이 제한 품목 목록에 있는지 확인해야 합니다."},
{id:167,cat:'logistics',en:"The container will be available for pickup from the CY tomorrow.",ko:"컨테이너는 내일 CY에서 픽업 가능합니다."},
{id:168,cat:'logistics',en:"Please confirm the lead time for booking equipment.",ko:"장비 부킹의 리드타임을 확인해 주세요."},
{id:169,cat:'logistics',en:"The vessel will call at three ports before reaching the final destination.",ko:"선박은 최종 목적지에 도착하기 전 3개 항구에 기항합니다."},
{id:170,cat:'logistics',en:"We need to arrange the export license before shipment.",ko:"선적 전에 수출 허가를 준비해야 합니다."},
{id:171,cat:'logistics',en:"Can you send me the arrival notice for this shipment?",ko:"이 화물의 도착 통지서를 보내주실 수 있나요?"},
{id:172,cat:'logistics',en:"The cargo was short-shipped due to a weight discrepancy.",ko:"중량 차이로 인해 화물이 부족 선적되었습니다."},
{id:173,cat:'logistics',en:"We need to arrange cargo insurance with an ICC(A) condition.",ko:"ICC(A) 조건으로 화물 보험을 준비해야 합니다."},
{id:174,cat:'logistics',en:"The container has been placed on a customs examination queue.",ko:"컨테이너가 세관 검사 대기 목록에 등재되었습니다."},
{id:175,cat:'logistics',en:"Please confirm the CFS cut-off for LCL cargo this week.",ko:"이번 주 LCL 화물의 CFS 마감을 확인해 주세요."},
{id:176,cat:'logistics',en:"We will arrange a multi-modal transport solution for this shipment.",ko:"이 화물에 대해 복합 운송 솔루션을 준비하겠습니다."},
{id:177,cat:'logistics',en:"The cargo arrived short — three pallets are missing from the shipment.",ko:"화물이 부족하게 도착했습니다 — 팔레트 3개가 누락되었습니다."},
{id:178,cat:'logistics',en:"Can you arrange an urgent booking for tomorrow's vessel?",ko:"내일 출항하는 선박에 긴급 부킹을 준비해 주실 수 있나요?"},
{id:179,cat:'logistics',en:"We need to re-export the cargo under the bonded procedure.",ko:"보세 절차를 통해 화물을 재수출해야 합니다."},
{id:180,cat:'logistics',en:"The terminal handling charge is included in the quoted freight.",ko:"견적 운임에 터미널 하역료(THC)가 포함되어 있습니다."},
{id:181,cat:'logistics',en:"Please send the pre-alert and all documents to our destination agent.",ko:"목적지 에이전트에게 사전 통보와 모든 서류를 보내주세요."},
{id:182,cat:'logistics',en:"We are facing a shortage of empty containers in this region.",ko:"이 지역에서 공컨테이너 부족 현상이 발생하고 있습니다."},
{id:183,cat:'logistics',en:"The cargo has passed customs and is ready for delivery.",ko:"화물이 통관을 마쳤으며 배송 준비가 완료되었습니다."},
{id:184,cat:'logistics',en:"Please confirm whether the port accepts oversized cargo.",ko:"항만에서 초과 규격 화물을 취급하는지 확인해 주세요."},
{id:185,cat:'logistics',en:"We need to arrange a fumigation certificate for wooden packing.",ko:"목재 포장재에 대한 훈증 증명서를 준비해야 합니다."},
{id:186,cat:'logistics',en:"The vessel ETD has been changed to next Tuesday due to weather.",ko:"기상 악화로 선박 ETD가 다음 주 화요일로 변경되었습니다."},
{id:187,cat:'logistics',en:"Can you confirm the incoterm and freight responsibility for this order?",ko:"이 주문의 인코텀즈와 운임 책임을 확인해 주실 수 있나요?"},
{id:188,cat:'logistics',en:"We would like to switch from sea freight to air freight for urgent cargo.",ko:"긴급 화물은 해상 운송에서 항공 운송으로 전환하고 싶습니다."},
{id:189,cat:'logistics',en:"The packing list does not match the cargo received at the warehouse.",ko:"패킹리스트가 창고에서 수령한 화물과 일치하지 않습니다."},
{id:190,cat:'logistics',en:"Please note the vessel will be arriving two days earlier than expected.",ko:"선박이 예상보다 2일 일찍 도착할 예정임을 참고하세요."},
{id:191,cat:'logistics',en:"We need to file the ENS declaration before the vessel departs.",ko:"선박 출항 전에 ENS 신고를 해야 합니다."},
{id:192,cat:'logistics',en:"The empty container pickup order has been issued to the trucking company.",ko:"공컨테이너 픽업 지시서가 운송 업체에 발급되었습니다."},
{id:193,cat:'logistics',en:"Can you check if the bill of lading has been telex-released?",ko:"B/L이 텔렉스 릴리즈 처리되었는지 확인해 주실 수 있나요?"},
{id:194,cat:'logistics',en:"The cargo was damaged during transit and we need to file a claim.",ko:"화물이 운송 중 손상되어 클레임을 제기해야 합니다."},
{id:195,cat:'logistics',en:"We have arranged the phytosanitary inspection for next Monday.",ko:"다음 월요일 식물검역 검사를 준비하였습니다."},
{id:196,cat:'logistics',en:"Please send us the port dues and terminal tariff schedule.",ko:"항만 사용료 및 터미널 요금표를 보내주세요."},
{id:197,cat:'logistics',en:"The cargo is in transit through the free trade zone.",ko:"화물이 자유무역지역을 통과하는 중입니다."},
{id:198,cat:'logistics',en:"We need to arrange a weight bridge certificate for the cargo.",ko:"화물에 대한 계근 증명서를 준비해야 합니다."},
{id:199,cat:'logistics',en:"The shipment has been confirmed and the booking number is 12345.",ko:"화물 부킹이 확인되었으며 부킹 번호는 12345입니다."},
// ── 💼 비즈니스 회화 (200-299) ──
{id:200,cat:'biz',en:"Let's get the meeting started — we have a lot to cover today.",ko:"회의를 시작하겠습니다 — 오늘 다룰 내용이 많습니다."},
{id:201,cat:'biz',en:"Could you walk us through the key points of your proposal?",ko:"제안서의 핵심 사항을 설명해 주실 수 있나요?"},
{id:202,cat:'biz',en:"I'd like to circle back to that point a bit later.",ko:"그 부분은 나중에 다시 다루고 싶습니다."},
{id:203,cat:'biz',en:"Let's take a five-minute break and reconvene at half past.",ko:"5분 휴식 후 30분에 다시 모이겠습니다."},
{id:204,cat:'biz',en:"Can we table this discussion for the next meeting?",ko:"이 논의는 다음 회의로 미룰 수 있을까요?"},
{id:205,cat:'biz',en:"I'm afraid we're running a bit over schedule.",ko:"일정보다 조금 늦어지고 있는 것 같습니다."},
{id:206,cat:'biz',en:"That's a fair point — let me address that.",ko:"맞는 말씀입니다 — 그 부분을 설명해 드리겠습니다."},
{id:207,cat:'biz',en:"We need to align on the priorities before moving forward.",ko:"진행하기 전에 우선순위에 대한 합의가 필요합니다."},
{id:208,cat:'biz',en:"Could you take the lead on this project?",ko:"이 프로젝트를 맡아주실 수 있나요?"},
{id:209,cat:'biz',en:"Let's touch base again after you've had a chance to review it.",ko:"검토해 보신 후 다시 이야기 나눠보겠습니다."},
{id:210,cat:'biz',en:"We're trying to streamline the process to reduce turnaround time.",ko:"처리 시간을 줄이기 위해 프로세스를 간소화하려고 합니다."},
{id:211,cat:'biz',en:"I'll loop in our legal team on this matter.",ko:"법무팀을 이 사안에 포함시키겠습니다."},
{id:212,cat:'biz',en:"The deadline is firm — we cannot extend it further.",ko:"마감 기한은 확정적입니다 — 더 이상 연장할 수 없습니다."},
{id:213,cat:'biz',en:"Let me run this by my manager before we commit.",ko:"확정하기 전에 상관에게 보고해 보겠습니다."},
{id:214,cat:'biz',en:"We need to get everyone on the same page before launch.",ko:"출시 전에 모든 사람이 같은 이해를 갖도록 해야 합니다."},
{id:215,cat:'biz',en:"Could you send me a recap of today's discussion?",ko:"오늘 논의 내용을 요약해서 보내주실 수 있나요?"},
{id:216,cat:'biz',en:"I appreciate your transparency on this issue.",ko:"이 문제에 대해 솔직하게 말씀해 주셔서 감사합니다."},
{id:217,cat:'biz',en:"We're looking for a win-win solution for both parties.",ko:"양측 모두에게 유리한 해결책을 찾고 있습니다."},
{id:218,cat:'biz',en:"That's outside the scope of our current agreement.",ko:"그것은 현재 계약 범위를 벗어나는 내용입니다."},
{id:219,cat:'biz',en:"Let's schedule a follow-up call for Thursday afternoon.",ko:"목요일 오후에 팔로업 통화 일정을 잡겠습니다."},
{id:220,cat:'biz',en:"I need this report on my desk by end of day.",ko:"오늘 업무 종료 전까지 이 보고서가 필요합니다."},
{id:221,cat:'biz',en:"We've exceeded our quarterly targets — great job, everyone.",ko:"분기 목표를 초과 달성했습니다 — 모두 수고하셨습니다."},
{id:222,cat:'biz',en:"The budget for this quarter has already been allocated.",ko:"이번 분기 예산은 이미 배정되었습니다."},
{id:223,cat:'biz',en:"Could you give me a ballpark figure for the total cost?",ko:"총 비용에 대한 대략적인 수치를 알려주실 수 있나요?"},
{id:224,cat:'biz',en:"We need to put together a business case for the board.",ko:"이사회를 위한 사업 계획서를 작성해야 합니다."},
{id:225,cat:'biz',en:"I'll get back to you on that by the end of the week.",ko:"이번 주 말까지 그 부분에 대해 답변 드리겠습니다."},
{id:226,cat:'biz',en:"Let's not reinvent the wheel — we can adapt the existing process.",ko:"처음부터 다시 만들 필요는 없습니다 — 기존 프로세스를 조정하면 됩니다."},
{id:227,cat:'biz',en:"We are committed to delivering on time and within budget.",ko:"저희는 기간 내 예산 안에서 납품할 것을 약속합니다."},
{id:228,cat:'biz',en:"Can you share the latest version of the spreadsheet?",ko:"스프레드시트 최신 버전을 공유해 주실 수 있나요?"},
{id:229,cat:'biz',en:"We need to bring in more resources to meet the timeline.",ko:"일정을 맞추기 위해 추가 자원을 투입해야 합니다."},
{id:230,cat:'biz',en:"I'd like to get your buy-in before we proceed.",ko:"진행하기 전에 귀하의 동의를 받고 싶습니다."},
{id:231,cat:'biz',en:"Let's take this offline and discuss in more detail later.",ko:"이 부분은 오프라인에서 나중에 더 자세히 논의하겠습니다."},
{id:232,cat:'biz',en:"We need to manage client expectations from the very start.",ko:"처음부터 고객 기대를 잘 관리해야 합니다."},
{id:233,cat:'biz',en:"The ROI on this project is projected at 25% over two years.",ko:"이 프로젝트의 ROI는 2년간 25%로 예상됩니다."},
{id:234,cat:'biz',en:"Please make sure the deliverables are clearly defined.",ko:"산출물이 명확하게 정의되도록 해주세요."},
{id:235,cat:'biz',en:"We're at a critical juncture and need to make a decision soon.",ko:"중요한 시점에 있으며 곧 결정을 내려야 합니다."},
{id:236,cat:'biz',en:"Could you prepare a SWOT analysis for the next board meeting?",ko:"다음 이사회 회의를 위해 SWOT 분석을 준비해 주실 수 있나요?"},
{id:237,cat:'biz',en:"We need to benchmark our performance against industry standards.",ko:"업계 기준에 맞게 성과를 벤치마킹해야 합니다."},
{id:238,cat:'biz',en:"I appreciate your flexibility on the payment terms.",ko:"결제 조건에 유연하게 대응해 주셔서 감사합니다."},
{id:239,cat:'biz',en:"Let's set up a KPI dashboard to track the key metrics.",ko:"핵심 지표를 추적하기 위한 KPI 대시보드를 설정하겠습니다."},
{id:240,cat:'biz',en:"We are targeting a 15% market share in the Asia-Pacific region.",ko:"아시아태평양 지역에서 15% 시장 점유율을 목표로 하고 있습니다."},
{id:241,cat:'biz',en:"Could you escalate this to the decision-maker on your side?",ko:"귀측의 의사결정권자에게 에스컬레이션해 주실 수 있나요?"},
{id:242,cat:'biz',en:"We'll need a signed NDA before sharing any proprietary information.",ko:"독점 정보를 공유하기 전에 서명된 NDA가 필요합니다."},
{id:243,cat:'biz',en:"Let's debrief after the client presentation and assess how it went.",ko:"고객 프레젠테이션 후 결과를 평가하는 디브리핑을 진행합시다."},
{id:244,cat:'biz',en:"We'll reach out to potential partners to explore collaboration opportunities.",ko:"잠재 파트너에게 협력 기회를 탐색하기 위해 연락할 것입니다."},
{id:245,cat:'biz',en:"Could you share your thoughts on the draft agreement?",ko:"계약서 초안에 대한 귀하의 의견을 공유해 주실 수 있나요?"},
{id:246,cat:'biz',en:"We need to address the bottlenecks in our supply chain.",ko:"공급망의 병목 지점을 해결해야 합니다."},
{id:247,cat:'biz',en:"The project is on track and we expect to deliver on time.",ko:"프로젝트는 순조롭게 진행 중이며 기한 내 납품을 예상합니다."},
{id:248,cat:'biz',en:"I'm happy to jump on a call whenever is convenient for you.",ko:"편하신 시간에 언제든지 통화할 준비가 되어 있습니다."},
{id:249,cat:'biz',en:"We need to document all action items and assign ownership.",ko:"모든 실행 항목을 문서화하고 담당자를 지정해야 합니다."},
{id:250,cat:'biz',en:"Could you give us a status update on the pending deliverables?",ko:"미결 산출물에 대한 진행 상황을 업데이트해 주실 수 있나요?"},
{id:251,cat:'biz',en:"We're seeing a significant uptick in demand this quarter.",ko:"이번 분기 수요가 상당히 증가하고 있습니다."},
{id:252,cat:'biz',en:"Let's pilot this in one region before rolling it out globally.",ko:"전사적으로 출시하기 전에 한 지역에서 먼저 파일럿을 진행합시다."},
{id:253,cat:'biz',en:"We need to make this process more scalable for future growth.",ko:"미래 성장을 위해 이 프로세스를 더 확장 가능하게 만들어야 합니다."},

// ===== STATE =====
let state={};
let catFilter='all', viewMode='study';
let session=[], sessionIdx=0, flipped=false, streak=0;

function getS(id){
  if(!state[id])state[id]={seen:false,correct:0,fail:0,bookmarked:false,nextReview:0};
  return state[id];
}

const SR=[1,10,60,1440,4320,10080];
function nextInterval(n){return SR[Math.min(n,SR.length-1)]*60000;}

function getCatCards(){
  return catFilter==='all'?CARDS:CARDS.filter(c=>c.cat===catFilter);
}

// ===== SESSION =====
function startSession(type){
  viewMode='study';
  document.getElementById('btnStudy').className='top-btn on';
  document.getElementById('btnList').className='top-btn';

  let pool=[...getCatCards()];
  if(type==='unseen') pool=pool.filter(c=>!getS(c.id).seen);
  else if(type==='fail') pool=pool.filter(c=>getS(c.id).fail>0);
  else if(type==='bookmark') pool=pool.filter(c=>getS(c.id).bookmarked);
  else if(type==='random'){pool.sort(()=>Math.random()-.5);pool=pool.slice(0,50);}
  else pool.sort((a,b)=>getS(a.id).nextReview-getS(b.id).nextReview);

  if(!pool.length){
    document.getElementById('mainInner').innerHTML=`<div class="done-box"><div class="ico">🎉</div><h2>해당 카드 없음</h2><p>조건에 맞는 카드가 없습니다.<br>다른 필터를 선택해보세요.</p><button class="nbtn" onclick="startSession('all')">전체 학습 시작</button></div>`;
    return;
  }
  session=pool; sessionIdx=0; streak=0; flipped=false;
  renderCard();
}

function renderWelcome(){
  document.getElementById('mainInner').innerHTML=`<div class="done-box"><div class="ico">📚</div><h2>시작해보세요!</h2><p>왼쪽에서 카테고리와 세션 유형을 선택하세요.</p><button class="nbtn" onclick="startSession('all')" style="margin-top:8px">▶ 전체 학습 시작</button></div>`;
}

function renderCard(){
  const mi=document.getElementById('mainInner');
  if(sessionIdx>=session.length){
    mi.innerHTML=`<div class="done-box"><div class="ico">🏆</div><h2>세션 완료!</h2><p>총 ${session.length}장 완료<br>연속 정답 최고 ${streak}회</p><button class="nbtn" onclick="startSession('all')" style="margin-top:8px">🔄 다시 시작</button></div>`;
    return;
  }
  const card=session[sessionIdx];
  const s=getS(card.id);
  const catL={email:'📧 이메일',logistics:'🚢 물류',biz:'💼 비즈니스',daily:'☀️ 일상'}[card.cat];
  const bmCls=s.bookmarked?'nbtn bm-on':'nbtn';
  const bmTxt=s.bookmarked?'⭐ 북마크':'☆ 북마크';

  mi.innerHTML=`
    <div class="study-prog">
      <span>${sessionIdx+1} / ${session.length} · ${catL}</span>
      <span class="streak">${streak>0?'🔥 '+streak+'연속':''}</span>
      <span>정답 ${s.correct} · 오답 ${s.fail}</span>
    </div>
    <div class="card-scene" onclick="flipCard()">
      <div class="card-3d${flipped?' flipped':''}" id="card3d">
        <div class="card-face front">
          <div class="c-label">🇰🇷 한국어</div>
          <div class="c-main">${card.ko}</div>
          <div class="c-hint">탭하여 영어 정답 확인 👆</div>
        </div>
        <div class="card-face back">
          <div class="c-label">🇬🇧 영어 정답</div>
          <div class="c-main">${card.en}</div>
          <div class="c-sub">${card.ko}</div>
        </div>
      </div>
    </div>
    ${flipped?`
    <div class="btn-row">
      <button class="abtn bad" onclick="markCard(${card.id},false)">❌ 몰랐다</button>
      <button class="abtn skip" onclick="nextCard()">⏭ 넘기기</button>
      <button class="abtn good" onclick="markCard(${card.id},true)">✅ 알았다!</button>
    </div>`:`
    <div class="btn-row">
      <button class="abtn skip" onclick="flipCard()">👆 뒤집어서 확인하기</button>
    </div>`}
    <div class="nav-row">
      <button class="${bmCls}" onclick="toggleBm(${card.id})">${bmTxt}</button>
      <button class="nbtn" onclick="prevCard()">◀ 이전</button>
      <button class="nbtn" onclick="nextCard()">다음 ▶</button>
    </div>`;
}

function flipCard(){flipped=!flipped;renderCard();}
function nextCard(){sessionIdx++;flipped=false;renderCard();}
function prevCard(){if(sessionIdx>0){sessionIdx--;flipped=false;renderCard();}}

async function markCard(id,correct){
  const s=getS(id);
  s.seen=true;
  if(correct){s.correct++;streak++;s.nextReview=Date.now()+nextInterval(s.correct);}
  else{s.fail++;streak=0;s.nextReview=Date.now()+nextInterval(0);}
  state[id]=s;
  updateSidebar();
  sessionIdx++;flipped=false;renderCard();
  await saveCard(id);
}

async function toggleBm(id){
  const s=getS(id);
  s.bookmarked=!s.bookmarked;
  state[id]=s;
  renderCard();
  updateSidebar();
  await saveCard(id);
}

// ===== LIST MODE =====
function setMode(m){
  viewMode=m;
  document.getElementById('btnStudy').className='top-btn'+(m==='study'?' on':'');
  document.getElementById('btnList').className='top-btn'+(m==='list'?' on':'');
  if(m==='study') renderWelcome();
  else renderList();
}

function renderList(){
  const mi=document.getElementById('mainInner');
  const kw='';
  let pool=getCatCards();
  mi.innerHTML=`
    <div class="list-top">
      <input class="sbox" id="listSearch" placeholder="🔍 영어·한국어 검색..." oninput="filterList()">
      <span class="lcnt" id="listCnt">${pool.length}개</span>
    </div>
    <div id="listBody">${renderListItems(pool)}</div>`;
}

function filterList(){
  const kw=document.getElementById('listSearch').value.toLowerCase();
  let pool=getCatCards().filter(c=>!kw||c.en.toLowerCase().includes(kw)||c.ko.includes(kw));
  document.getElementById('listCnt').textContent=pool.length+'개';
  document.getElementById('listBody').innerHTML=renderListItems(pool);
}

function renderListItems(pool){
  return pool.map((c,i)=>{
    const s=getS(c.id);
    const cls=s.correct>=3&&!s.fail?'lcard ok':s.fail?'lcard fail':'lcard';
    const catL={email:'📧',logistics:'🚢',biz:'💼',daily:'☀️'}[c.cat];
    return `<div class="${cls}">
      <div class="lnum">${catL}${i+1}</div>
      <div style="flex:1">
        <div class="len">${c.en}</div>
        <div class="lko">${c.ko}</div>
        <div class="lbadges">
          ${s.correct?`<span class="bdg ok">✓ ${s.correct}회</span>`:''}
          ${s.fail?`<span class="bdg fail">✗ ${s.fail}회</span>`:''}
          ${s.bookmarked?'<span class="bdg bm">⭐</span>':''}
          ${!s.seen?'<span class="bdg new">미학습</span>':''}
        </div>
      </div>
      <button class="lbtn${s.bookmarked?' on':''}" onclick="toggleBmList(${c.id})">${s.bookmarked?'⭐':'☆'}</button>
    </div>`;
  }).join('');
}

async function toggleBmList(id){
  const s=getS(id);s.bookmarked=!s.bookmarked;state[id]=s;
  filterList();updateSidebar();
  await saveCard(id);
}

// ===== SIDEBAR =====
function setCat(v,btn){
  catFilter=v;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  if(viewMode==='list') renderList();
  else renderWelcome();
}

function updateSidebar(){
  const all=CARDS.map(c=>getS(c.id));
  const done=all.filter(s=>s.seen).length;
  const mastered=all.filter(s=>s.correct>=3&&!s.fail).length;
  const needWork=all.filter(s=>s.fail>0).length;
  const pct=Math.round(mastered/CARDS.length*100);
  document.getElementById('mDone').textContent=done;
  document.getElementById('mMastered').textContent=mastered;
  document.getElementById('mFail').textContent=needWork;
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progPct').textContent=pct+'%';
}

// ===== INIT =====
async function init(){
  const code=getUserCode();
  if(!code){showCodePopup();return;}
  document.getElementById('sideCode').textContent=code;
  try{
    const local=JSON.parse(localStorage.getItem('fc_state_'+code)||'{}');
    Object.keys(local).forEach(id=>{state[parseInt(id)]=local[parseInt(id)];});
  }catch(e){}
  updateSidebar();
  renderWelcome();
  await loadProgress();
}
init();
</script>
